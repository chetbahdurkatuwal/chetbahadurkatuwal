<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>My Simple Website</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
    }

    header {
      background: #333;
      color: white;
      padding: 15px;
      text-align: center;
    }

    nav {
      background: #555;
      padding: 10px;
      text-align: center;
    }

    nav a {
      color: white;
      margin: 10px;
      text-decoration: none;
      font-weight: bold;
    }

    nav a:hover {
      color: yellow;
    }

    .container {
      padding: 20px;
    }

    .card {
      background: #f4f4f4;
      padding: 15px;
      margin: 10px 0;
      border-radius: 8px;
    }

    footer {
      background: #333;
      color: white;
      text-align: center;
      padding: 10px;
      margin-top: 20px;
    }
  </style>
</head>

<body>

<header>
  <h1>Welcome to My Website</h1>
  <p>This is my first simple website</p>
</header>

<nav>
  <a href="#">Home</a>
  <a href="#">About</a>
  <a href="#">Services</a>
  <a href="#">Contact</a>
</nav>

<div class="container">
  <div class="card">
    <h2>About Me</h2>
    <p>I am learning web development and 3D animation.</p>
  </div>

  <div class="card">
    <h2>My Work</h2>
    <p>I create 3D animation videos for YouTube.</p>
  </div>

  <div class="card">
    <h2>Contact</h2>
    <p>Email: example@gmail.com</p>
  </div>
</div>

<footer>
  <p>© 2026 My Website | All Rights Reserved</p>
</footer>

</body>
</html>
